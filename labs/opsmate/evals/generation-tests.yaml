  - type: icontains-any
    value:
    - pg_is_in_recovery
    - recovery
    - leader
    - patroni
  - type: llm-rubric
    value: The answer explains how to identify the real primary — running pg_is_in_recovery() (the primary
      returns false / f, replicas return true / t), or checking the failover controller (Patroni/repmgr)
      leader lock. It must point at a concrete check, not a vague "look at the database".
