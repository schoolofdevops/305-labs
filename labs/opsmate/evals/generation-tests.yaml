- description: gen-cache-stampede-fix [cache-stampede.md]
  vars:
    query: how do I stop a cache stampede when a hot key expires
  assert:
  - type: icontains-any
    value:
    - single-flight
    - coalesc
    - jitter
    - recompute
    - probabilistic
  - type: llm-rubric
    value: 'The answer names at least one real cache-stampede fix: request coalescing / single-flight
      (only the first request recomputes), early/probabilistic recomputation, or jittered TTLs. A generic
      "add more cache" is not sufficient.'
- description: gen-queue-poison [queue-backlog.md]
  vars:
    query: one message keeps failing on a loop and blocking the queue partition, what do I do
  assert:
  - type: icontains-any
    value:
