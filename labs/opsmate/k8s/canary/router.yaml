# =============================================================================
# OpsMate traffic router — the split in front of the two backends.
#
# One nginx pod sits in front of base (opsmate-model) and canary
# (opsmate-canary) and splits traffic between them by weight. This is the
# CHEAPEST honest canary router: no service mesh, no CRDs, one 64Mi nginx and a
# ConfigMap you can read. KServe and the Gateway API do this properly (survey in
# the lesson); here you drive the mechanics by hand so the abstraction has
# meaning when you meet it.
#
# HOW THE SPLIT WORKS: nginx `split_clients` hashes a key (here the per-request
# id) into the 0-100% space and picks an upstream by the weight buckets. Same key
# space, deterministic buckets, so over many requests the distribution converges
# to the weights. The X-Served-By response header names which backend answered —
# your per-request observability hook (the lab reads it to watch the split live).
#
# CHANGING THE WEIGHT is deliberately a two-step manual act:
#   1. edit the percentages in the ConfigMap below
#   2. kubectl rollout restart deploy/opsmate-router   (nginx re-reads the config)
# Manual and visible on purpose — you FEEL the promote/rollback before M9's
# survey shows you the abstractions that automate it.
#
#   kubectl --kubeconfig k8s/kubeconfig apply -f k8s/canary/router.yaml
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opsmate-router-conf
  labels:
    app: opsmate-router
data:
  nginx.conf: |
    # nginx runs one worker; this is a laptop router, not a load balancer tier.
    worker_processes 1;
    events { worker_connections 256; }

    http {
      # --- the two backends, by their in-cluster Service names -----------------
      upstream base   { server opsmate-model:8080; }
      upstream canary { server opsmate-canary:8080; }

      # --- the split ----------------------------------------------------------
      # split_clients hashes the key ($request_id — unique per request) across the
      # percentage space and assigns $backend_pool to an upstream by weight.
      # THESE TWO LINES ARE THE WEIGHTS. Edit them to re-weight the canary, then
      # `kubectl rollout restart deploy/opsmate-router` for nginx to re-read.
      #   10%  -> canary   (the thin slice a canary takes)
      #   rest -> base     (the * bucket is everything not matched above)
      split_clients "${request_id}" $backend_pool {
        10%     canary;
        *       base;
      }

      # A named map so the X-Served-By header carries the human name of the pool.
      map $backend_pool $served_by {
        canary "canary";
        base   "base";
      }

      server {
        listen 8080;

        # The router's OWN liveness — answered by nginx directly, no backend hop.
        # The readiness probe hits this so the router is "up" when nginx is up,
        # independent of the backends. (A bare GET / would proxy to llama-server,
        # which returns 415 to a probe with no chat body — never Ready. So the
        # probe gets its own self-answered path.)
        location = /ping {
          access_log off;
          return 200 "ok\n";
        }

        location / {
          # Route to whichever upstream the split picked for THIS request.
          proxy_pass http://$backend_pool;
          proxy_set_header Host $host;

          # THE OBSERVABILITY HOOK: stamp every response with which backend served
          # it. `always` so it is present even on error responses. The lab greps
          # this header to watch the split converge to the weights.
          add_header X-Served-By $served_by always;

          # A model completion can take a while on CPU — give the upstream room so
          # the router does not 504 before llama-server finishes generating.
          proxy_read_timeout 120s;
          proxy_connect_timeout 5s;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsmate-router
  labels:
    app: opsmate-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsmate-router
  template:
    metadata:
      labels:
        app: opsmate-router
      annotations:
        # Bump this to force a rollout when only the ConfigMap changed — a
        # ConfigMap edit alone does NOT restart the pod, so nginx keeps the old
        # config until the pod is recreated. `kubectl rollout restart` does the
        # same thing; this annotation is here so you know WHY the restart matters.
        conf-revision: "1"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine     # tiny, multi-arch, no model — just a proxy
          ports:
            - name: http
              containerPort: 8080
          resources:
            # A router forwards bytes; it holds no model. 64Mi is generous for
            # one nginx worker — a rounding error next to a 1.2Gi model pod, which
            # is the whole point: the split costs almost nothing to run.
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /ping        # nginx answers this directly (200); no backend hop
              port: http
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf     # mount just the one file, not over /etc/nginx
      volumes:
        - name: conf
          configMap:
            name: opsmate-router-conf
---
# The router's Service — this is the address CLIENTS now dial instead of the
# model Service directly. The client contract is unchanged (OpenAI /v1); it just
# points at the router, which decides base-or-canary per request.
apiVersion: v1
kind: Service
metadata:
  name: opsmate-router
  labels:
    app: opsmate-router
spec:
  selector:
    app: opsmate-router
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
